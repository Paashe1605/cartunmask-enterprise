steps:
  # Step 1: Build the backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cartunmask-repo/backend:$COMMIT_SHA', './backend']
    id: 'Build Backend Image'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/cartunmask-repo/backend:$COMMIT_SHA']
    id: 'Push Backend Image'

  # Step 3: Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cartunmask-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cartunmask-repo/backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'cartunmask-run-sa@$PROJECT_ID.iam.gserviceaccount.com' # Replace with actual SA
      - '--port'
      - '8080'
    id: 'Deploy Backend to Cloud Run'

options:
  logging: CLOUD_LOGGING_ONLY
